name: Visual regression

on:
  pull_request:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate screenshot baselines and upload them as an artifact"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json
      - name: Install test dependencies
        working-directory: tests/e2e
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium
      - name: Run visual and interaction regression suite
        if: ${{ !inputs.update_snapshots }}
        working-directory: tests/e2e
        run: npx playwright test --update-snapshots=missing
      - name: Regenerate all screenshot baselines
        if: ${{ inputs.update_snapshots }}
        working-directory: tests/e2e
        run: npx playwright test --grep @visual --update-snapshots
      - name: Upload screenshot baselines
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-baselines
          path: tests/e2e/__screenshots__/
          retention-days: 7
      - name: Require regenerated baselines to be committed
        if: ${{ !inputs.update_snapshots }}
        run: |
          if [ -n "$(git status --porcelain -- tests/e2e/__screenshots__)" ]; then
            echo "::error::Screenshot baselines were missing and have been generated in this run. Download the screenshot-baselines artifact, commit it under tests/e2e/__screenshots__/, and push again."
            git status --porcelain -- tests/e2e/__screenshots__
            exit 1
          fi
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
