name: Test Android app

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/test-android.yml"
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/test-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Test, lint and build parity app
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rating-lab-android-lint
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: warn
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rating-lab-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
