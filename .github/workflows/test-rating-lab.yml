name: Test Rating Lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run model and pipeline tests
        run: python -m unittest discover -s tests -v
      - name: Check browser JavaScript syntax
        run: |
          node --check assets/js/rating-lab.js
          node --check assets/js/centered-correlation-explain.js
