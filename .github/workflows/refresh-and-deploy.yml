name: Refresh ratings and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set cache date
        id: cache-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: .cache/rating-lab
          key: rating-lab-public-data-v4-${{ runner.os }}-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            rating-lab-public-data-v4-${{ runner.os }}-
            rating-lab-public-data-v3-${{ runner.os }}-
      - name: Restore last validated public snapshot
        uses: actions/cache@v4
        with:
          path: .cache/rating-lab-output
          key: rating-lab-valid-output-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            rating-lab-valid-output-v1-${{ runner.os }}-
      - name: Seed fallback from last validated snapshot
        run: |
          for file in manifest.json tennis.json football.json national-football.json chess.json player-football.json player-schema.json; do
            if [ -f ".cache/rating-lab-output/$file" ]; then
              cp ".cache/rating-lab-output/$file" "assets/data/rating-lab/$file"
            fi
          done
      - name: Install archive reader
        run: sudo apt-get update && sudo apt-get install --yes zstd
      - name: Refresh public ratings
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          RATING_LAB_CACHE_DIR: .cache/rating-lab
        run: |
          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            sports="football national-football chess"
            if [ "$(date -u +%u)" = "1" ] || [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
              sports="tennis $sports"
            fi
            python scripts/refresh_ratings.py --sports $sports
          fi
          python scripts/refresh_ratings.py --players-only
      - name: Preserve validated public snapshot
        run: |
          mkdir -p .cache/rating-lab-output
          cp assets/data/rating-lab/{manifest,tennis,football,national-football,chess,player-football,player-schema}.json .cache/rating-lab-output/
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
