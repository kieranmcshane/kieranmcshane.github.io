name: Check learning proofs

on:
  pull_request:
    paths:
      - "proofs/**"
      - ".github/workflows/check-learning-proofs.yml"
  push:
    branches: [main]
    paths:
      - "proofs/**"
      - ".github/workflows/check-learning-proofs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: proofs
          build: true
          test: false
          lint: false
          use-mathlib-cache: true
