<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" role="img" aria-labelledby="title description">
  <title id="title">Phase disk for two random binary projective measurements</title>
  <desc id="description">The alpha beta unit square contains a disk of radius one half centered at one half, one half. Inside the disk, the high-dimensional compatibility threshold tends to one over square root of two.</desc>
  <style>
    :root {
      --fg: #172033;
      --muted: #5d6878;
      --grid: #c8d0db;
      --outside: #f4f6f8;
      --inside: #d8f1f1;
      --accent: #087f8c;
      --marker: #a33b20;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #edf2f7;
        --muted: #bac3cf;
        --grid: #566277;
        --outside: #202735;
        --inside: #173f45;
        --accent: #67d4dc;
        --marker: #ff9b7a;
      }
    }
    text { fill: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .plot { fill: var(--outside); stroke: var(--fg); stroke-width: 2.5; }
    .disk { fill: var(--inside); stroke: var(--accent); stroke-width: 4; }
    .guide { stroke: var(--grid); stroke-width: 2; stroke-dasharray: 8 8; }
    .tick { stroke: var(--fg); stroke-width: 2; }
    .axis-label { font-size: 24px; font-style: italic; }
    .tick-label { font-size: 20px; }
    .region { font-size: 24px; font-weight: 650; }
    .equation { font-size: 24px; }
    .note { fill: var(--muted); font-size: 19px; }
    .center { fill: var(--marker); }
  </style>

  <rect class="plot" x="185" y="50" width="500" height="500" rx="2"/>
  <circle class="disk" cx="435" cy="300" r="250"/>

  <line class="guide" x1="435" y1="50" x2="435" y2="550"/>
  <line class="guide" x1="185" y1="300" x2="685" y2="300"/>
  <circle class="center" cx="435" cy="300" r="6"/>

  <line class="tick" x1="185" y1="550" x2="185" y2="562"/>
  <line class="tick" x1="435" y1="550" x2="435" y2="562"/>
  <line class="tick" x1="685" y1="550" x2="685" y2="562"/>
  <line class="tick" x1="173" y1="550" x2="185" y2="550"/>
  <line class="tick" x1="173" y1="300" x2="185" y2="300"/>
  <line class="tick" x1="173" y1="50" x2="185" y2="50"/>

  <text class="tick-label" x="185" y="590" text-anchor="middle">0</text>
  <text class="tick-label" x="435" y="590" text-anchor="middle">½</text>
  <text class="tick-label" x="685" y="590" text-anchor="middle">1</text>
  <text class="tick-label" x="153" y="557" text-anchor="end">0</text>
  <text class="tick-label" x="153" y="307" text-anchor="end">½</text>
  <text class="tick-label" x="153" y="57" text-anchor="end">1</text>
  <text class="axis-label" x="721" y="558">α</text>
  <text class="axis-label" x="177" y="28">β</text>

  <text class="region" x="435" y="245" text-anchor="middle">maximal incompatibility</text>
  <text class="equation" x="435" y="282" text-anchor="middle">τ → 1/√2</text>
  <text class="equation" x="435" y="349" text-anchor="middle">(α − ½)² + (β − ½)² ≤ ¼</text>
  <text class="note" x="435" y="381" text-anchor="middle">the high-dimensional phase disk</text>

  <text class="note" x="202" y="82">outside</text>
  <text class="note" x="668" y="82" text-anchor="end">outside</text>
</svg>
