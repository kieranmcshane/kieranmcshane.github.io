<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title description">
  <title id="title">Equivalent views of the random-projection compatibility disk</title>
  <desc id="description">Three linked panels show a point inside the disk in alpha beta parameter space, the limiting principal-angle interval containing one half, and a two-dimensional block with principal angle pi over four.</desc>
  <style>
    :root {
      --fg: #172033;
      --muted: #5f6b7a;
      --grid: #c7ced8;
      --accent: #087f8c;
      --accent-fill: #d7f3f4;
      --marker: #a33b20;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #edf2f7;
        --muted: #b7c0cc;
        --grid: #596579;
        --accent: #67d4dc;
        --accent-fill: #173f45;
        --marker: #ff9b7a;
      }
    }
    text {
      fill: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .panel-title { font-size: 22px; font-weight: 600; }
    .label { font-size: 18px; }
    .small { fill: var(--muted); font-size: 16px; }
    .axis, .tick, .separator { stroke: var(--grid); stroke-width: 2; }
    .axis { marker-end: url(#arrow-neutral); }
    .disk { fill: var(--accent-fill); stroke: var(--accent); stroke-width: 3; }
    .accent { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; }
    .marker { fill: var(--marker); stroke: var(--marker); }
    .ray { stroke: var(--fg); stroke-width: 4; stroke-linecap: round; }
    .angle { fill: none; stroke: var(--accent); stroke-width: 3; }
    .equiv { fill: var(--muted); font-size: 34px; }
  </style>
  <defs>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--grid)"/>
    </marker>
  </defs>

  <line class="separator" x1="385" y1="70" x2="385" y2="365"/>
  <line class="separator" x1="815" y1="70" x2="815" y2="365"/>

  <g aria-label="Disk in alpha beta parameter space">
    <text class="panel-title" x="180" y="44" text-anchor="middle">Parameter space</text>
    <line class="axis" x1="70" y1="325" x2="310" y2="325"/>
    <line class="axis" x1="70" y1="325" x2="70" y2="85"/>
    <circle class="disk" cx="180" cy="215" r="110"/>
    <line class="tick" x1="180" y1="319" x2="180" y2="331"/>
    <line class="tick" x1="64" y1="215" x2="76" y2="215"/>
    <circle class="marker" cx="228" cy="233" r="6"/>
    <text class="label" x="240" y="228">(α, β)</text>
    <text class="small" x="66" y="348">0</text>
    <text class="small" x="172" y="348">½</text>
    <text class="small" x="286" y="348">1</text>
    <text class="small" x="45" y="220">½</text>
    <text class="small" x="50" y="111">1</text>
    <text class="label" x="318" y="331">α</text>
    <text class="label" x="63" y="75">β</text>
    <text class="small" x="180" y="386" text-anchor="middle">distance from (½, ½) ≤ ½</text>
  </g>

  <text class="equiv" x="401" y="228">⇔</text>

  <g aria-label="Limiting principal-angle interval">
    <text class="panel-title" x="600" y="44" text-anchor="middle">Limiting spectrum</text>
    <line class="axis" x1="450" y1="220" x2="770" y2="220"/>
    <line class="accent" x1="505" y1="220" x2="715" y2="220"/>
    <line class="tick" x1="505" y1="205" x2="505" y2="235"/>
    <line class="tick" x1="715" y1="205" x2="715" y2="235"/>
    <line class="marker" x1="610" y1="178" x2="610" y2="254" stroke-width="3"/>
    <circle class="marker" cx="610" cy="220" r="6"/>
    <text class="label" x="505" y="190" text-anchor="middle">λ⁻</text>
    <text class="label" x="715" y="190" text-anchor="middle">λ⁺</text>
    <text class="label" x="610" y="278" text-anchor="middle">½</text>
    <text class="small" x="450" y="246" text-anchor="middle">0</text>
    <text class="small" x="750" y="246" text-anchor="middle">1</text>
    <text class="label" x="610" y="330" text-anchor="middle">½ ∈ [λ⁻, λ⁺]</text>
    <text class="small" x="610" y="358" text-anchor="middle">squared principal-angle cosine</text>
  </g>

  <text class="equiv" x="831" y="228">⇔</text>

  <g aria-label="Two-dimensional principal-angle block">
    <text class="panel-title" x="1010" y="44" text-anchor="middle">Principal-angle block</text>
    <circle cx="975" cy="226" r="4" fill="var(--fg)"/>
    <line class="ray" x1="885" y1="226" x2="1100" y2="226"/>
    <line class="ray" x1="912" y1="289" x2="1052" y2="149"/>
    <path class="angle" d="M 1022 226 A 47 47 0 0 0 1008 193"/>
    <text class="label" x="1032" y="196">θ = π/4</text>
    <text class="label" x="1090" y="214">E</text>
    <text class="label" x="1057" y="151">F</text>
    <text class="label" x="1010" y="322" text-anchor="middle">
      D<tspan baseline-shift="sub" font-size="13">E</tspan> = σ<tspan baseline-shift="sub" font-size="13">z</tspan>
      <tspan dx="18">and</tspan>
      <tspan dx="18">D</tspan><tspan baseline-shift="sub" font-size="13">F</tspan>
      <tspan baseline-shift="baseline"> = σ</tspan><tspan baseline-shift="sub" font-size="13">x</tspan>
    </text>
    <text class="small" x="1010" y="358" text-anchor="middle">the maximally incompatible qubit pair</text>
  </g>
</svg>
