<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title description">
  <title id="title">Why the phase disk produces maximal incompatibility</title>
  <desc id="description">The limiting interval of squared principal-angle cosines contains one half. Finite-dimensional blocks therefore occur arbitrarily close to principal angle pi over four, and their centered observables approach the Pauli sigma z and sigma x matrices.</desc>
  <style>
    :root {
      color-scheme: light;
      --fg: #172033;
      --muted: #5d6878;
      --grid: #c8d0db;
      --accent: #087f8c;
      --soft: #d8f1f1;
      --marker: #a33b20;
    }
    text { fill: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .panel-title { font-size: 21px; font-weight: 650; }
    .label { font-size: 20px; }
    .small { fill: var(--muted); font-size: 17px; }
    .baseline { stroke: var(--grid); stroke-width: 3; }
    .interval { stroke: var(--accent); stroke-width: 9; stroke-linecap: round; }
    .endpoint { stroke: var(--accent); stroke-width: 3; }
    .half { stroke: var(--marker); stroke-width: 3; }
    .half-dot { fill: var(--marker); }
    .ray { stroke: var(--fg); stroke-width: 5; stroke-linecap: round; }
    .angle { fill: none; stroke: var(--accent); stroke-width: 4; }
    .bloch { fill: var(--soft); stroke: var(--grid); stroke-width: 2; }
    .vector-z { stroke: var(--accent); stroke-width: 5; }
    .vector-x { stroke: var(--marker); stroke-width: 5; }
    .arrow { fill: var(--muted); font-size: 40px; }
    .result { font-size: 22px; font-weight: 650; }
  </style>
  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="arrow-marker" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--marker)"/>
    </marker>
  </defs>

  <rect width="1200" height="430" fill="#ffffff"/>

  <g aria-label="Limiting spectral interval">
    <text class="panel-title" x="190" y="52" text-anchor="middle">Limiting spectral interval</text>
    <line class="baseline" x1="45" y1="205" x2="335" y2="205"/>
    <line class="interval" x1="91" y1="205" x2="289" y2="205"/>
    <line class="endpoint" x1="91" y1="187" x2="91" y2="223"/>
    <line class="endpoint" x1="289" y1="187" x2="289" y2="223"/>
    <line class="half" x1="190" y1="158" x2="190" y2="252"/>
    <circle class="half-dot" cx="190" cy="205" r="7"/>
    <text class="label" x="91" y="177" text-anchor="middle">λ⁻</text>
    <text class="label" x="289" y="177" text-anchor="middle">λ⁺</text>
    <text class="label" x="190" y="281" text-anchor="middle">½</text>
    <text class="small" x="45" y="236" text-anchor="middle">0</text>
    <text class="small" x="335" y="236" text-anchor="middle">1</text>
    <text class="result" x="190" y="343" text-anchor="middle">½ ∈ [λ⁻, λ⁺]</text>
    <text class="small" x="190" y="372" text-anchor="middle">squared cosine of a principal angle</text>
  </g>

  <text class="arrow" x="373" y="220">⇒</text>

  <g aria-label="Principal-angle block at pi over four">
    <text class="panel-title" x="580" y="52" text-anchor="middle">Two-dimensional block</text>
    <circle cx="560" cy="218" r="5" fill="var(--fg)"/>
    <line class="ray" x1="443" y1="218" x2="714" y2="218"/>
    <line class="ray" x1="473" y1="305" x2="651" y2="127"/>
    <path class="angle" d="M 620 218 A 60 60 0 0 0 602 176"/>
    <text class="label" x="625" y="180">θ = π/4</text>
    <text class="label" x="699" y="205">E</text>
    <text class="label" x="656" y="128">F</text>
    <text class="result" x="580" y="343" text-anchor="middle">cos²θ = ½</text>
    <text class="small" x="580" y="372" text-anchor="middle">the critical principal-angle block</text>
  </g>

  <text class="arrow" x="754" y="220">⇒</text>

  <g aria-label="Pauli sigma z and sigma x observables">
    <text class="panel-title" x="1000" y="52" text-anchor="middle">Pauli witness</text>
    <circle class="bloch" cx="1000" cy="208" r="116"/>
    <ellipse cx="1000" cy="208" rx="116" ry="35" fill="none" stroke="var(--grid)" stroke-width="2"/>
    <line class="vector-z" x1="1000" y1="208" x2="1000" y2="106" marker-end="url(#arrow-accent)"/>
    <line class="vector-x" x1="1000" y1="208" x2="1095" y2="208" marker-end="url(#arrow-marker)"/>
    <circle cx="1000" cy="208" r="5" fill="var(--fg)"/>
    <text class="label" x="1013" y="111">σz</text>
    <text class="label" x="1080" y="194">σx</text>
    <text class="result" x="1000" y="359" text-anchor="middle">τ = 1/√2</text>
    <text class="small" x="1000" y="389" text-anchor="middle">the universal binary minimum</text>
  </g>
</svg>
